name: release-governance

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install .

      - name: Validate governance sources
        run: python -m vibe_governance validate --target .

      - name: Render managed outputs
        run: python -m vibe_governance render --target .

      - name: Verify repository is clean after render
        run: git diff --exit-code

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Package governance artifact
        run: tar -czf vibe-governance.tar.gz vibe_governance pyproject.toml README.md

      - uses: actions/upload-artifact@v4
        with:
          name: vibe-governance-artifact
          path: vibe-governance.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package release artifact
        run: tar -czf vibe-governance-${GITHUB_REF_NAME}.tar.gz vibe_governance pyproject.toml README.md

      - uses: softprops/action-gh-release@v2
        with:
          files: vibe-governance-${{ github.ref_name }}.tar.gz
